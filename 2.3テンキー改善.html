<!-- 119受報支援アプリ UIモック第2.3版 -->
<!-- 第2.2版からの主な変更：
・テンキーをPCテンキー配列へ変更
・電話番号入力欄でもテンキー表示
・別欄へ移動したらテンキー自動終了
・生年月日テンキーに「年」「月」「日」決定ボタン追加
・年→月→日へ入力欄自動移動
・西暦・大正・昭和・平成・令和をボタン化
-->

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>119受報支援アプリ UIモック第2.3版</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Yu Gothic","Meiryo",sans-serif;
  background:#eef1f5;
  color:#1f2937;
  padding-bottom:160px;
}
header{
  background:#991b1b;
  color:white;
  padding:12px 14px;
}
header h1{margin:0;font-size:21px}
.screen{display:none}
.screen.active{display:block}
.container{max-width:980px;margin:auto;padding:10px}
.card{
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.top-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.top-btn{
  border:none;
  border-radius:18px;
  min-height:125px;
  font-size:28px;
  font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,.18);
  cursor:pointer;
}
.top-btn small{display:block;font-size:14px;margin-top:8px;color:#374151}
.fire{background:#fee2e2}
.ems{background:#dbeafe}
.rescue{background:#ffedd5}
.other{background:#dcfce7}
.status{
  position:sticky;
  top:0;
  z-index:20;
  background:#111827;
  color:white;
  padding:10px 12px;
  border-radius:0 0 14px 14px;
  margin:-10px -10px 10px;
}
.status-main{font-size:20px;font-weight:bold;line-height:1.4}
.status-sub{font-size:15px;color:#d1d5db;margin-top:3px;line-height:1.4}
.app-layout{
  display:grid;
  grid-template-columns:82px 1fr;
  gap:10px;
}
.side-menu{
  position:sticky;
  top:72px;
  align-self:start;
  display:grid;
  gap:8px;
}
.menu-btn{
  border:none;
  border-radius:14px;
  padding:11px 5px;
  min-height:58px;
  background:#e5e7eb;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 2px 5px rgba(0,0,0,.12);
}
.menu-btn.active{
  background:#2563eb!important;
  color:white!important;
}
.menu-btn.done{
  background:#16a34a;
  color:white;
}
.menu-btn.pending{
  background:#fff7ed;
  color:#9a3412;
  border:2px solid #fb923c;
  animation: blink 1.1s infinite;
}
@keyframes blink{
  0%{opacity:1}
  50%{opacity:.45}
  100%{opacity:1}
}
.menu-btn.operation{
  background:#111827;
  color:white;
  border:2px solid #111827;
}
.menu-separator{
  height:6px;
  border-bottom:2px solid #9ca3af;
  margin-bottom:3px;
}
.panel{display:none}
.panel.active{display:block}
.section-title{
  font-size:20px;
  font-weight:bold;
  border-left:8px solid #991b1b;
  padding-left:10px;
  margin-bottom:10px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(135px,1fr));
  gap:8px;
}
.town-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.big-select{
  border:none;
  border-radius:14px;
  padding:20px 8px;
  background:white;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 2px 7px rgba(0,0,0,.15);
  cursor:pointer;
}
.big-select.selected{background:#2563eb;color:white}
.small-btn{
  border:none;
  border-radius:12px;
  padding:12px 8px;
  background:#e5e7eb;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}
.small-btn.selected{background:#2563eb;color:white}
.era-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
.era-btn{
  border:none;
  border-radius:12px;
  padding:13px 6px;
  background:#e5e7eb;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}
.era-btn.selected{
  background:#2563eb;
  color:white;
}
.row{
  display:grid;
  grid-template-columns:115px 1fr;
  gap:8px;
  align-items:start;
  margin-bottom:9px;
}
label{font-size:16px;font-weight:bold;padding-top:8px}
input,textarea{
  width:100%;
  font-size:18px;
  padding:10px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  background:white;
}
textarea{min-height:74px;resize:vertical}
textarea.large-input{
  min-height:125px;
  font-size:20px;
}
.kana-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
}
.area-name{font-size:17px}
.area-yomi{font-size:13px;color:#555;margin-top:4px}
.area-selected{background:#dcfce7!important;border:2px solid #16a34a}
.fold{
  margin-top:10px;
  border-top:1px solid #e5e7eb;
  padding-top:10px;
}
.fold summary{
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  padding:10px;
  background:#f3f4f6;
  border-radius:10px;
}
.nav-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
  border-top:1px solid #e5e7eb;
  padding-top:10px;
}
.nav-btn{
  border:none;
  border-radius:10px;
  padding:12px 14px;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  margin:4px;
}
.back{background:#374151;color:white}
.reset{background:#dc2626;color:white}
.cancel{background:#f59e0b;color:white}
.history{background:#0f766e;color:white}
.end{background:#4b5563;color:white}
.next{background:#2563eb;color:white}
.confirm{background:#7c3aed;color:white}
.confirm-box{
  background:#f9fafb;
  border:1px solid #cbd5e1;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
.confirm-line{
  font-size:18px;
  padding:8px 0;
  border-bottom:1px solid #e5e7eb;
}
.confirm-line:last-child{border-bottom:none}
.confirm-label{
  font-weight:bold;
  color:#374151;
  display:inline-block;
  min-width:95px;
}
.fixed-memo{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
  background:#111827;
  color:white;
  padding:9px 12px;
  box-shadow:0 -3px 10px rgba(0,0,0,.25);
}
.fixed-title{font-weight:bold;margin-bottom:5px;font-size:15px}
.fixed-memo textarea{
  height:92px;
  min-height:92px;
  background:#f9fafb;
}
.history-list button{
  width:100%;
  text-align:left;
  border:none;
  border-radius:10px;
  padding:12px;
  margin-bottom:8px;
  background:#f3f4f6;
  font-size:16px;
}
.keypad{
  display:none;
  position:fixed;
  right:14px;
  bottom:170px;
  width:265px;
  z-index:80;
  background:white;
  border-radius:16px;
  padding:10px;
  box-shadow:0 4px 18px rgba(0,0,0,.3);
}
.keypad.active{display:block}
.keypad-display{
  font-size:20px;
  font-weight:bold;
  text-align:center;
  padding:8px;
  background:#f3f4f6;
  border-radius:8px;
  margin-bottom:8px;
}
.keypad-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
.keypad button{
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  background:#e5e7eb;
}
.keypad .decision{
  background:#2563eb;
  color:white;
}
.keypad .danger{
  background:#dc2626;
  color:white;
}
.keypad-mode-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:8px;
}
@media(max-width:720px){
  .container{padding:8px}
  .top-grid{gap:10px}
  .top-btn{min-height:115px;font-size:25px}
  .app-layout{grid-template-columns:76px 1fr;gap:8px}
  .menu-btn{font-size:13px;min-height:54px}
  .row{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .town-grid{grid-template-columns:repeat(3,1fr)}
  .era-row{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>

<body onclick="handleBodyClick(event)">
<header>
  <h1>119受報支援アプリ UIモック第2.3版</h1>
</header>

<div class="container">

  <div id="topScreen" class="screen active">
    <div class="card">
      <div class="section-title">災害区分選択</div>
      <div class="top-grid">
        <button class="top-btn fire" onclick="startReception('火災')">火災<small>建物・林野・車両</small></button>
        <button class="top-btn ems" onclick="startReception('救急')">救急<small>急病・負傷・事故</small></button>
        <button class="top-btn rescue" onclick="startReception('救助')">救助<small>交通・水難・山岳</small></button>
        <button class="top-btn other" onclick="startReception('その他')">その他<small>警戒・相談・捜索等</small></button>
      </div>
    </div>
    <div class="card">
      <button class="nav-btn history" onclick="openHistory()">過去受報参照</button>
    </div>
  </div>

  <div id="workScreen" class="screen">
    <div class="status">
      <div class="status-main">選択中：<span id="mainLabel">未選択</span> ／ <span id="subLabel">種別未選択</span></div>
      <div class="status-sub">発生場所：<span id="placeLabel">未入力</span></div>
      <div class="status-sub">傷病者：<span id="patientLabel">未入力</span>　通報者：<span id="callerLabel">未入力</span></div>
    </div>

    <div class="app-layout">
      <div class="side-menu">
        <button id="operationMenu" class="menu-btn operation" onclick="openPanel('actionPanel',this)">操作</button>
        <div class="menu-separator"></div>
        <button id="typeMenu" class="menu-btn pending active" onclick="openPanel('typePanel',this)">種別</button>
        <button id="placeMenu" class="menu-btn pending" onclick="openPanel('placePanel',this)">場所</button>
        <button id="patientMenu" class="menu-btn pending" onclick="openPanel('patientPanel',this)">傷病者</button>
        <button id="callerMenu" class="menu-btn pending" onclick="openPanel('callerPanel',this)">通報者</button>
        <button id="confirmMenu" class="menu-btn" onclick="openPanel('confirmPanel',this);renderConfirm()">確認</button>
      </div>

      <main>
        <section id="typePanel" class="panel active card">
          <div class="section-title">種別選択</div>
          <div id="frequentTypes" class="grid"></div>
          <details id="otherTypesBox" class="fold">
            <summary>上記項目以外を表示</summary>
            <div id="otherTypes" class="grid" style="margin-top:10px"></div>
          </details>

          <div class="nav-row">
            <button class="nav-btn cancel" onclick="clearSubType()">種別を取り消す</button>
            <button class="nav-btn next" onclick="openPanelById('placePanel')">場所へ</button>
          </div>
        </section>

        <section id="placePanel" class="panel card">
          <div class="section-title">発生場所</div>
          <div class="row"><label>町名</label><div id="townButtons" class="town-grid"></div></div>
          <div class="row"><label>50音索引</label><div id="kanaButtons" class="kana-row"></div></div>
          <div class="row"><label>地域名</label><div id="areaButtons" class="grid"></div></div>
          <div class="row"><label>選択中</label><input id="selectedPlace" readonly placeholder="町名・地域名"></div>
          <button class="nav-btn cancel" onclick="removeArea()">地域名を取り消す</button>
          <div class="row" style="margin-top:10px"><label>番地・世帯主</label><textarea id="addressMemo" class="large-input" oninput="updatePlace()" placeholder="番地、世帯主、目標物など"></textarea></div>

          <div class="nav-row">
            <button class="nav-btn back" onclick="openPanelById('typePanel')">種別へ戻る</button>
            <button class="nav-btn next" onclick="openPanelById('patientPanel')">傷病者へ</button>
          </div>
        </section>

        <section id="patientPanel" class="panel card">
          <div class="section-title">傷病者情報</div>
          <div class="row"><label>氏名</label><textarea id="patientName" class="large-input" oninput="updateLabels()" placeholder="氏名不明の場合は「不明」等"></textarea></div>

          <div class="row">
            <label>生年月日区分</label>
            <div class="era-row">
              <button class="era-btn" onclick="setEra('taisho',this)">大正</button>
              <button class="era-btn" onclick="setEra('showa',this)">昭和</button>
              <button class="era-btn" onclick="setEra('heisei',this)">平成</button>
              <button class="era-btn" onclick="setEra('reiwa',this)">令和</button>
              <button class="era-btn selected" onclick="setEra('western',this)">西暦</button>
            </div>
          </div>

          <div class="row"><label>生年月日</label>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
              <input id="birthYear" readonly onclick="openKeypad(this,'birthYear')" placeholder="年">
              <input id="birthMonth" readonly onclick="openKeypad(this,'birthMonth')" placeholder="月">
              <input id="birthDay" readonly onclick="openKeypad(this,'birthDay')" placeholder="日">
            </div>
          </div>
          <div class="row"><label>年齢</label><input id="ageDisplay" readonly placeholder="自動表示"></div>

          <div class="nav-row">
            <button class="nav-btn back" onclick="openPanelById('placePanel')">場所へ戻る</button>
            <button class="nav-btn next" onclick="openPanelById('callerPanel')">通報者へ</button>
          </div>
        </section>

        <section id="callerPanel" class="panel card">
          <div class="section-title">通報者情報</div>
          <div class="row"><label>氏名</label><textarea id="callerName" class="large-input" oninput="updateLabels()" placeholder="氏名不明の場合は「不明」等"></textarea></div>
          <div class="row"><label>関係性</label><textarea id="callerRelation" class="large-input" oninput="updateCallerDone()" placeholder="本人・家族・近隣者・通行人など"></textarea></div>
          <div class="row"><label>電話番号</label><input id="callerPhone" placeholder="電話番号" readonly onclick="openKeypad(this,'phone')"></div>

          <div class="nav-row">
            <button class="nav-btn back" onclick="openPanelById('patientPanel')">傷病者へ戻る</button>
            <button class="nav-btn confirm" onclick="openPanelById('confirmPanel');renderConfirm()">確認へ</button>
          </div>
        </section>

        <section id="confirmPanel" class="panel card">
          <div class="section-title">受報内容確認</div>
          <div id="confirmContent" class="confirm-box"></div>

          <div class="nav-row">
            <button class="nav-btn back" onclick="openPanelById('callerPanel')">通報者へ戻る</button>
            <button class="nav-btn reset" onclick="resetReception()">リセット</button>
          </div>
        </section>

        <section id="actionPanel" class="panel card">
          <div class="section-title">操作</div>
          <button class="nav-btn back" onclick="backTop()">トップへ戻る</button>
          <button class="nav-btn reset" onclick="resetReception()">リセット</button>
          <button class="nav-btn history" onclick="openHistory()">過去受報参照</button>
        </section>
      </main>
    </div>
  </div>

  <div id="historyScreen" class="screen">
    <div class="card">
      <div class="section-title">過去受報参照</div>
      <div id="historyList" class="history-list"></div>
      <button class="nav-btn end" onclick="closeHistory()">参照終了</button>
    </div>
    <div id="historyDetail" class="card" style="display:none"></div>
  </div>

</div>

<div class="fixed-memo">
  <div class="fixed-title">常時メモ欄</div>
  <textarea id="globalMemo" placeholder="聴取中の自由メモ。ページ遷移しても維持されます。"></textarea>
</div>

<div id="keypad" class="keypad" onclick="event.stopPropagation()">
  <div id="keypadDisplay" class="keypad-display">入力</div>
  <div class="keypad-grid">
    <button onclick="keyInput('7')">7</button>
    <button onclick="keyInput('8')">8</button>
    <button onclick="keyInput('9')">9</button>
    <button onclick="keyInput('4')">4</button>
    <button onclick="keyInput('5')">5</button>
    <button onclick="keyInput('6')">6</button>
    <button onclick="keyInput('1')">1</button>
    <button onclick="keyInput('2')">2</button>
    <button onclick="keyInput('3')">3</button>
    <button class="danger" onclick="keyAC()">AC</button>
    <button onclick="keyInput('0')">0</button>
    <button onclick="keyBS()">BS</button>
  </div>
  <div class="keypad-mode-row">
    <button class="decision" onclick="confirmBirthPart('year')">年</button>
    <button class="decision" onclick="confirmBirthPart('month')">月</button>
    <button class="decision" onclick="confirmBirthPart('day')">日</button>
  </div>
  <button style="width:100%;margin-top:8px" onclick="closeKeypad()">閉じる</button>
</div>

let currentMain = "";
let currentSub = "";
let selectedTown = "";
let selectedArea = "";
let previousScreen = "topScreen";
let activeKeyInput = null;
let activeKeyMode = "";
let selectedEra = "western";

function show(id){
  closeKeypad();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startReception(main){
  currentMain = main;
  currentSub = "";
  selectedTown = "";
  selectedArea = "";

  document.getElementById('mainLabel').textContent = main;
  document.getElementById('subLabel').textContent = '種別未選択';
  document.getElementById('placeLabel').textContent = '未入力';

  setMenuPendingAll();

  renderTypes(main);
  renderTownButtons();
  renderKanaButtons();
  openPanelById('typePanel');
  show('workScreen');
}

function setMenuPendingAll(){
  ['typeMenu','placeMenu','patientMenu','callerMenu'].forEach(id=>{
    const btn = document.getElementById(id);
    btn.classList.remove('done');
    btn.classList.add('pending');
  });
}

function setMenuDone(id){
  const btn = document.getElementById(id);
  if(!btn) return;
  btn.classList.remove('pending');
  btn.classList.add('done');
}

function renderTypes(main){
  const frequent = document.getElementById('frequentTypes');
  const other = document.getElementById('otherTypes');
  const box = document.getElementById('otherTypesBox');
  frequent.innerHTML = '';
  other.innerHTML = '';
  box.open = false;

  typeData[main].frequent.forEach(t=>frequent.appendChild(typeButton(t)));
  typeData[main].other.forEach(t=>other.appendChild(typeButton(t)));
}

function typeButton(name){
  const btn = document.createElement('button');
  btn.className = 'big-select';
  btn.textContent = name;
  btn.onclick = ()=>{
    currentSub = name;
    document.getElementById('subLabel').textContent = name;
    document.querySelectorAll('.big-select').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    setMenuDone('typeMenu');
  };
  return btn;
}

function clearSubType(){
  currentSub = "";
  document.getElementById('subLabel').textContent = '種別未選択';
  document.querySelectorAll('.big-select').forEach(b=>b.classList.remove('selected'));
  const btn = document.getElementById('typeMenu');
  btn.classList.remove('done');
  btn.classList.add('pending');
}

function openPanel(panelId, btn){
  openPanelById(panelId);
  document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function openPanelById(panelId){
  closeKeypad();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');

  const map = {
    typePanel:'typeMenu',
    placePanel:'placeMenu',
    patientPanel:'patientMenu',
    callerPanel:'callerMenu',
    confirmPanel:'confirmMenu',
    actionPanel:'operationMenu'
  };

  document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));
  const target = document.getElementById(map[panelId]);
  if(target) target.classList.add('active');

  if(panelId === 'confirmPanel') renderConfirm();
}

function renderTownButtons(){
  const area = document.getElementById('townButtons');
  area.innerHTML = '';
  towns.forEach(t=>{
    const btn = document.createElement('button');
    btn.className = 'small-btn';
    btn.textContent = t;
    btn.onclick = ()=>{
      selectedTown = t;
      selectedArea = '';
      document.querySelectorAll('#townButtons .small-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('areaButtons').innerHTML = '';
      updatePlace();
    };
    area.appendChild(btn);
  });
}

function renderKanaButtons(){
  const area = document.getElementById('kanaButtons');
  area.innerHTML = '';
  kanaGroups.forEach(k=>{
    const btn = document.createElement('button');
    btn.className = 'small-btn';
    btn.textContent = k;
    btn.onclick = ()=>showAreas(k);
    area.appendChild(btn);
  });
}

function normalizeYomi(yomi){
  return String(yomi || '')
    .normalize('NFKC')
    .replace(/[ァ-ヶ]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
}

function kanaMatch(group,yomi){
  const normalized = normalizeYomi(yomi);
  const first = normalized.charAt(0);
  const maps = {
    'あ':['あ','い','う','え','お'],
    'か':['か','き','く','け','こ','が','ぎ','ぐ','げ','ご'],
    'さ':['さ','し','す','せ','そ','ざ','じ','ず','ぜ','ぞ'],
    'た':['た','ち','つ','て','と','だ','ぢ','づ','で','ど'],
    'な':['な','に','ぬ','ね','の'],
    'は':['は','ひ','ふ','へ','ほ','ば','び','ぶ','べ','ぼ','ぱ','ぴ','ぷ','ぺ','ぽ'],
    'ま':['ま','み','む','め','も'],
    'や':['や','ゆ','よ'],
    'ら':['ら','り','る','れ','ろ'],
    'わ':['わ','を','ん']
  };
  return (maps[group] || []).includes(first);
}

function showAreas(group){
  const area = document.getElementById('areaButtons');
  area.innerHTML = '';
  if(!selectedTown){
    area.innerHTML = '<p>先に町名を選択してください。</p>';
    return;
  }
  const list = (areaData[selectedTown] || []).filter(a=>kanaMatch(group,a.yomi));
  if(list.length === 0){
    area.innerHTML = '<p>該当なし</p>';
    return;
  }
  list.forEach(a=>{
    const btn = document.createElement('button');
    btn.className = 'small-btn';
    btn.innerHTML = `<div class="area-name">${a.name}</div><div class="area-yomi">${a.yomi}</div>`;
    btn.onclick = ()=>{
      selectedArea = a.name;
      document.querySelectorAll('#areaButtons .small-btn').forEach(b=>b.classList.remove('area-selected'));
      btn.classList.add('area-selected');
      updatePlace();
    };
    area.appendChild(btn);
  });
}

function removeArea(){
  selectedArea = '';
  document.querySelectorAll('#areaButtons .small-btn').forEach(b=>b.classList.remove('area-selected'));
  updatePlace();
}

function updatePlace(){
  const detail = document.getElementById('addressMemo').value;
  const base = [selectedTown, selectedArea].filter(Boolean).join(' ');
  document.getElementById('selectedPlace').value = base;
  document.getElementById('placeLabel').textContent = [base,detail].filter(Boolean).join(' ') || '未入力';

  if(base || detail.trim()){
    setMenuDone('placeMenu');
  }
}

function updateLabels(){
  const patient = document.getElementById('patientName').value.trim();
  const caller = document.getElementById('callerName').value.trim();

  document.getElementById('patientLabel').textContent = patient || '未入力';
  document.getElementById('callerLabel').textContent = caller || '未入力';

  if(patient){
    setMenuDone('patientMenu');
  }
  updateCallerDone();
}

function updateCallerDone(){
  const caller = document.getElementById('callerName').value.trim();
  const relation = document.getElementById('callerRelation').value.trim();
  const phone = document.getElementById('callerPhone').value.trim();

  if(caller || relation || phone){
    setMenuDone('callerMenu');
  }
}

function setEra(era, btn){
  selectedEra = era;
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  calcAge();
}

function eraLabel(){
  const labels = {
    taisho:'大正',
    showa:'昭和',
    heisei:'平成',
    reiwa:'令和',
    western:'西暦'
  };
  return labels[selectedEra] || '西暦';
}

function openKeypad(input, mode){
  event.stopPropagation();
  activeKeyInput = input;
  activeKeyMode = mode || '';
  document.getElementById('keypadDisplay').textContent = input.value || '入力';
  document.getElementById('keypad').classList.add('active');
}

function keyInput(n){
  if(!activeKeyInput)return;
  activeKeyInput.value += n;
  document.getElementById('keypadDisplay').textContent = activeKeyInput.value;
  if(activeKeyMode === 'phone'){
    updateCallerDone();
  }else{
    calcAge();
  }
}

function keyBS(){
  if(!activeKeyInput)return;
  activeKeyInput.value = activeKeyInput.value.slice(0,-1);
  document.getElementById('keypadDisplay').textContent = activeKeyInput.value || '入力';
  if(activeKeyMode === 'phone'){
    updateCallerDone();
  }else{
    calcAge();
  }
}

function keyAC(){
  if(!activeKeyInput)return;
  activeKeyInput.value = '';
  document.getElementById('keypadDisplay').textContent = '入力';
  if(activeKeyMode === 'phone'){
    updateCallerDone();
  }else{
    calcAge();
  }
}

function confirmBirthPart(part){
  if(part === 'year'){
    document.getElementById('birthMonth').click();
  }else if(part === 'month'){
    document.getElementById('birthDay').click();
  }else if(part === 'day'){
    closeKeypad();
  }
  calcAge();
}

function closeKeypad(){
  document.getElementById('keypad').classList.remove('active');
  activeKeyInput = null;
  activeKeyMode = '';
}

function handleBodyClick(event){
  const tag = event.target.tagName.toLowerCase();
  const id = event.target.id;

  if(id === 'birthYear' || id === 'birthMonth' || id === 'birthDay' || id === 'callerPhone'){
    return;
  }

  if(tag === 'textarea' || tag === 'input' || tag === 'button' || tag === 'summary'){
    if(!event.target.closest('#keypad')){
      const isKeypadTarget = id === 'birthYear' || id === 'birthMonth' || id === 'birthDay' || id === 'callerPhone';
      if(!isKeypadTarget) closeKeypad();
    }
  }
}

function toWesternYear(){
  const y = Number(document.getElementById('birthYear').value);
  if(!y)return null;
  if(selectedEra==='western') return y;
  if(selectedEra==='reiwa') return 2018 + y;
  if(selectedEra==='heisei') return 1988 + y;
  if(selectedEra==='showa') return 1925 + y;
  if(selectedEra==='taisho') return 1911 + y;
  return null;
}

function calcAge(){
  const y = toWesternYear();
  const m = Number(document.getElementById('birthMonth').value);
  const d = Number(document.getElementById('birthDay').value);
  const display = document.getElementById('ageDisplay');
  if(!y || !m || !d){display.value='';return;}
  const today = new Date();
  let age = today.getFullYear() - y;
  const tm = today.getMonth()+1;
  const td = today.getDate();
  if(tm < m || (tm === m && td < d)) age--;
  display.value = (age < 0 || age > 130) ? '確認要' : age + '歳';
}

function renderConfirm(){
  const content = document.getElementById('confirmContent');
  content.innerHTML = `
    <div class="confirm-line"><span class="confirm-label">災害区分</span>${currentMain || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">種別</span>${currentSub || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">発生場所</span>${document.getElementById('placeLabel').textContent || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">傷病者</span>${document.getElementById('patientName').value || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">生年月日</span>${getBirthText()}</div>
    <div class="confirm-line"><span class="confirm-label">年齢</span>${document.getElementById('ageDisplay').value || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">通報者</span>${document.getElementById('callerName').value || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">関係性</span>${document.getElementById('callerRelation').value || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">電話番号</span>${document.getElementById('callerPhone').value || '未入力'}</div>
    <div class="confirm-line"><span class="confirm-label">常時メモ</span>${document.getElementById('globalMemo').value || '未入力'}</div>
  `;
}

function getBirthText(){
  const y = document.getElementById('birthYear').value;
  const m = document.getElementById('birthMonth').value;
  const d = document.getElementById('birthDay').value;
  if(!y && !m && !d) return '未入力';
  return `${eraLabel()} ${y || '未'}年 ${m || '未'}月 ${d || '未'}日`;
}

function collectReception(){
  return {
    savedAt:new Date().toLocaleString('ja-JP'),
    main:currentMain,
    sub:currentSub,
    place:document.getElementById('placeLabel').textContent,
    patient:document.getElementById('patientName').value,
    birth:getBirthText(),
    age:document.getElementById('ageDisplay').value,
    caller:document.getElementById('callerName').value,
    relation:document.getElementById('callerRelation').value,
    phone:document.getElementById('callerPhone').value,
    memo:document.getElementById('globalMemo').value
  };
}

function saveHistory(){
  let histories = JSON.parse(localStorage.getItem('receptionHistoriesV23') || '[]');
  histories.unshift(collectReception());
  histories = histories.slice(0,20);
  localStorage.setItem('receptionHistoriesV23',JSON.stringify(histories));
}

function resetReception(){
  if(!confirm('現在の受報用紙を保存して、新しい受報用紙にしますか？')) return;
  saveHistory();
  document.querySelectorAll('input,textarea').forEach(el=>el.value='');
  document.getElementById('areaButtons').innerHTML = '';
  currentMain='';currentSub='';selectedTown='';selectedArea='';
  selectedEra = 'western';
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.era-btn')[4].classList.add('selected');

  document.getElementById('mainLabel').textContent='未選択';
  document.getElementById('subLabel').textContent='種別未選択';
  document.getElementById('placeLabel').textContent='未入力';
  document.getElementById('patientLabel').textContent='未入力';
  document.getElementById('callerLabel').textContent='未入力';
  closeKeypad();
  show('topScreen');
}

function backTop(){show('topScreen')}

function openHistory(){
  previousScreen = document.querySelector('.screen.active').id;
  const histories = JSON.parse(localStorage.getItem('receptionHistoriesV23') || '[]');
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  document.getElementById('historyDetail').style.display = 'none';
  if(histories.length === 0){
    list.innerHTML = '<p>保存された過去受報はありません。</p>';
  }else{
    histories.forEach(h=>{
      const btn = document.createElement('button');
      btn.textContent = `${h.savedAt}　${h.main || '未選択'}／${h.sub || '未選択'}　${h.place || ''}`;
      btn.onclick = ()=>showHistoryDetail(h);
      list.appendChild(btn);
    });
  }
  show('historyScreen');
}

function showHistoryDetail(h){
  const box = document.getElementById('historyDetail');
  box.style.display = 'block';
  box.innerHTML = `
    <div class="section-title">受報内容</div>
    <div class="row"><label>保存時刻</label><input readonly value="${h.savedAt || ''}"></div>
    <div class="row"><label>種別</label><input readonly value="${h.main || ''} ／ ${h.sub || ''}"></div>
    <div class="row"><label>場所</label><textarea readonly>${h.place || ''}</textarea></div>
    <div class="row"><label>傷病者</label><textarea readonly>${h.patient || ''} ${h.birth || ''} ${h.age || ''}</textarea></div>
    <div class="row"><label>通報者</label><textarea readonly>${h.caller || ''} ／ ${h.relation || ''} ／ ${h.phone || ''}</textarea></div>
    <div class="row"><label>メモ</label><textarea readonly>${h.memo || ''}</textarea></div>
  `;
}

function closeHistory(){show(previousScreen || 'topScreen')}
